<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to the API</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 10vh;
            background-color: #f8f9fa;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: inline-block;
        }
        h1 { color: #2c3e50; }

        /* Button Styling */
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Custom API Page! 🚀</h1>
        <p>Your Django Ninja endpoint is running beautifully.</p>

        <!-- Link to our new HTML page (adjust the URL to match your routing) -->
        <a href="/api/ninja/users-page" class="btn">View All Users</a>
    </div>
</body>
</html>
