apiVersion: apps/v1
kind: Deployment
metadata:
  name: money-mate-web
  namespace: money-mate
spec:
  replicas: 2
  selector:
    matchLabels:
      app: money-mate-web
  template:
    metadata:
      labels:
        app: money-mate-web
    spec:
      containers:
        - name: web
          image: money-mate-app:local
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: money-mate-config
            - secretRef:
                name: money-mate-secrets
          readinessProbe:
            httpGet:
              path: /healthz/
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.4
          args: ["--credentials-file=/secrets/sa-key.json", "moneymate-501413:us-central1:money-mate-db"]
          volumeMounts:
            - name: cloudsql-key
              mountPath: /secrets
              readOnly: true
      volumes:
        - name: cloudsql-key
          secret:
            secretName: cloudsql-sa-key